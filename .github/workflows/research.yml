name: Daily Research

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install feedparser newspaper3k lxml_html_clean

      - name: Ensure outputs folder
        run: mkdir -p outputs

      - name: Run script
        run: python run_pipeline.py

      - name: Save output
        uses: actions/upload-artifact@v4
        with:
          name: research-output
          path: outputs/
