name: Daily Research Miner

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run miner
        env:
          THEMES: "embedded systems,firmware jobs,rtos"
        run: |
          python run_pipeline.py --themes "$THEMES" --out-dir . --query-depth 72 --target-total-links 120 --min-links-per-theme 12 --strict-diversity

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_news_*.md
          if git diff --staged --quiet; then
            echo "No markdown changes"
          else
            git commit -m "chore: update research report"
            git push
          fi
